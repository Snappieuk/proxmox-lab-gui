name: Auto Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    env:
      APP_DIR: /opt/proxmox-lab-gui
      SERVICE_NAME: proxmox-gui
    steps:
      - name: Validate install path
        run: |
          if [ ! -d "${APP_DIR}" ]; then
            echo "ERROR: ${APP_DIR} does not exist on this runner"
            echo "Run installer first: curl -sSL https://raw.githubusercontent.com/Snappieuk/proxmox-lab-gui/main/install.sh | sudo bash"
            exit 1
          fi

      - name: Stop running app
        run: |
          if systemctl list-unit-files | grep -q "^${SERVICE_NAME}.service"; then
            sudo systemctl stop "${SERVICE_NAME}" || true
          fi
          pkill -f "${APP_DIR}/run.py" 2>/dev/null || true
          sleep 1
          
      - name: Pull latest changes
        run: |
          cd "${APP_DIR}"
          git fetch --all --prune
          git reset --hard origin/main
          
      - name: Install dependencies
        run: |
          "${APP_DIR}/venv/bin/pip" install -r "${APP_DIR}/requirements.txt"

      - name: Run migrations
        run: |
          cd "${APP_DIR}"
          "${APP_DIR}/venv/bin/python3" migrate_db.py
          
      - name: Start app
        run: |
          if systemctl list-unit-files | grep -q "^${SERVICE_NAME}.service"; then
            sudo systemctl daemon-reload
            sudo systemctl restart "${SERVICE_NAME}"
            sleep 2
          else
            nohup "${APP_DIR}/venv/bin/python3" "${APP_DIR}/run.py" > /tmp/flask.log 2>&1 &
            sleep 3
          fi
          
      - name: Verify app is running
        run: |
          if systemctl list-unit-files | grep -q "^${SERVICE_NAME}.service"; then
            if systemctl is-active --quiet "${SERVICE_NAME}"; then
              echo "✓ ${SERVICE_NAME} service is running"
              exit 0
            else
              echo "ERROR: ${SERVICE_NAME} failed to start"
              sudo journalctl -u "${SERVICE_NAME}" -n 50 --no-pager || true
              exit 1
            fi
          else
            if pgrep -f "${APP_DIR}/run.py" > /dev/null; then
              echo "✓ Flask app is running"
              exit 0
            else
              echo "ERROR: Flask app failed to start"
              tail -30 /tmp/flask.log || true
              exit 1
            fi
          fi
